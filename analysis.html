<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clout Calc - Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand brand-mark mb-0" href="./index.html" aria-label="Clout Calc home">
                <span class="brand-mark__text">Clout <strong>Calc</strong></span>
            </a>
            <div class="ms-auto d-flex gap-2">
                <button type="button" class="btn btn-primary" id="run-analysis-submit">Run Analysis</button>
                <a class="btn btn-primary" href="./index.html" aria-label="Back to calculator">&larr; Back</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="card mb-3">
            <div class="card-body">
                <form id="analysis-form" novalidate>
                    <h4>Analysis Parameters</h4>

                    <div class="form-floating mb-3">
                        <input type="number" class="form-control" id="bow-energy" name="bowEnergy" step="1" min="0" value="27540000" placeholder="Bow Energy (gr.fps^2)">
                        <label for="bow-energy">Bow Energy (gr.fps^2)</label>
                    </div>

                    <div class="form-floating">
                        <input type="number" class="form-control" id="rotating-mass" name="rotatingMass" step="1" min="0" value="65" placeholder="Rotating Mass (grains)">
                        <label for="rotating-mass">Rotating Mass (grains)</label>
                    </div>

                    <div class="form-floating mt-3">
                        <input type="number" class="form-control" id="turn-let-off" name="turnLetOff" step="0.1" min="0" value="3.1" placeholder="Turn Let Off (%)">
                        <label for="turn-let-off">Turn Let Off %</label>
                    </div>
                </form>
            </div>
        </section>

        <section class="card mb-3">
            <div class="card-body">
                <h4>Results - 185m</h4>
                <div class="table-responsive">
                    <table id="analysis-results-table" class="table table-striped table-bordered align-middle mb-0">
                        <thead>
                            <tr>
                                <th scope="col"></th>
                                <th scope="col" colspan="5" class="text-center">Wind Angle</th>
                            </tr>
                            <tr>
                                <th scope="col">Wind Speed (mph)</th>
                                <th scope="col" class="text-center">0</th>
                                <th scope="col" class="text-center">45</th>
                                <th scope="col" class="text-center">90</th>
                                <th scope="col" class="text-center">135</th>
                                <th scope="col" class="text-center">180</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">5</th>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                            <tr>
                                <th scope="row">10</th>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                            <tr>
                                <th scope="row">15</th>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                            <tr>
                                <th scope="row">20</th>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/calc.js"></script>
    <script src="js/score-sim.js"></script>
    <script src="js/analysis.js"></script>
</body>

</html>
